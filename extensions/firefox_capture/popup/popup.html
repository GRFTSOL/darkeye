<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #333;
    }
    .panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fff;
    }
    .header {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #e1e1e1;
      padding-bottom: 12px;
      margin-bottom: 4px;
      gap: 4px;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-weight: 600;
      font-size: 16px;
      color: #333;
    }
    .server-status {
      font-size: 11px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .actions {
      display: flex;
      gap: 10px;
    }
    button.action-btn {
      flex: 1;
      padding: 8px 16px;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .btn-capture {
      background: #007aff;
      color: #fff;
      border-color: #007aff;
    }
    .btn-capture:hover { 
      background: #0062cc;
      border-color: #0062cc;
    }
    .btn-send {
      background: #34c759;
      color: #fff;
      border-color: #34c759;
    }
    .btn-send:hover { 
      background: #248a3d;
      border-color: #248a3d;
    }
    .output {
      margin-top: 4px;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      padding: 8px;
      font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 11px;
      height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: #495057;
      line-height: 1.4;
    }
    .status {
      font-size: 11px;
      color: #868e96;
      text-align: right;
    }
    /* 滚动条样式 */
    .output::-webkit-scrollbar {
      width: 6px;
    }
    .output::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    .output::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 3px;
    }
    .output::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="header-top">
        <div class="title">DarkEye Capture</div>
      </div>
      <div class="server-status" id="server-status">⚪ 正在连接...</div>
    </div>

    <div class="actions">
      <button id="btn-capture" class="action-btn btn-capture">多作品番号列表</button>
      <button id="btn-capture-detail" class="action-btn btn-capture-detail">单作品详细信息</button>
      
      <button id="btn-send" class="action-btn btn-send">发送数据</button>
    </div>
    <div class="output"></div>
    <div class="status">Ready</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
