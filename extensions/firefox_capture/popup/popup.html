<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #333;
    }
    .panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fff;
    }
    .header {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #e1e1e1;
      padding-bottom: 12px;
      margin-bottom: 0;
      gap: 4px;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-weight: 600;
      font-size: 16px;
      color: #333;
    }
    .server-status {
      font-size: 11px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="header-top">
        <div class="title">DarkEye Capture</div>
      </div>
      <div class="server-status" id="server-status">⚪ 正在连接...</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
